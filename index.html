

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
overflow:hidden;
background:#111;
color:white;
font-family:Arial,Helvetica,sans-serif;
}

.page{
height:100vh;
display:flex;
flex-direction:column;
padding:25px 35px;
}

.header{
height:140px;
display:grid;
grid-template-columns:220px 1fr 160px;
align-items:center;
gap:20px;
flex-shrink:0;
}

.logo{
height:150px;
object-fit:contain;
margin-left:100px;
}

.title{
text-align:center;
font-size:72px;
font-weight:bold;
}

.qr{
background:white;
border:10px;
padding:10px;
justify-self:end;
margin-right:100px;

}

.carousel{
flex:1;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
padding:0 90px;
touch-action:none;
}

.track{
display:flex;
gap:25px;
transition:transform .45s ease;
}

.card{
width:calc((100vw - 220px - 90px) / 5);
max-width:360px;
min-width:260px;
height:70vh;
background:#222;
border-radius:20px;
overflow:hidden;
flex-shrink:0;
display:flex;
flex-direction:column;
text-align:center;
opacity:.45;
transition:transform .35s ease,opacity .35s ease;
}

.card.active{
opacity:1;
transform:scale(1.08);
}

.card img{
width:100%;
height:calc(70vh - 90px);
object-fit:cover;
pointer-events:none;
}

.name{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
padding:10px;
}

a,
a:visited,
a:hover,
a:active{
color:white;
text-decoration:none;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
width:100px;
height:100px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:65px;
z-index:20;
cursor:pointer;
}

.left{left:20px;}
.right{right:20px;}

</style>
</head>

<script>

new QRCode(
document.getElementById("homeqr"),
{
text:"http://www.fishysfriendsrescue.com",
width:120,
height:120
}
);


const track=document.getElementById("track");
function updateActive(){
document.querySelectorAll(".card")
.forEach(c=>c.classList.remove("active"));
let cards=document.querySelectorAll(".card");
cards[2].classList.add("active");
cards[0].style.visibility="visible";
cards[1].style.visibility="visible";
cards[2].style.visibility="visible";
cards[3].style.visibility="visible";
cards[4].style.visibility="visible";
cards[5].style.visibility="hidden";
cards[6].style.visibility="hidden";

}

function move(dir){
let card=document.querySelector(".card");
let step=card.offsetWidth+25;
track.style.transition="transform .45s ease";
track.style.transform=
"translateX("+(-step*dir)+"px)";
setTimeout(()=>{
if(dir>0){
track.appendChild(
track.firstElementChild
);

}else{

track.insertBefore(
track.lastElementChild,
track.firstElementChild
);

}

track.style.transition="none";
track.style.transform="translateX(0)";

updateActive();

},450);

}


updateActive();


let startX=0;
let startY=0;

const carousel=document.querySelector(".carousel");

carousel.addEventListener(
"pointerdown",
e=>{

startX=e.clientX;
startY=e.clientY;

});


carousel.addEventListener(
"pointerup",
e=>{

let dx=e.clientX-startX;
let dy=e.clientY-startY;


if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){

e.preventDefault();

if(dx<0){
move(1);
}else{
move(-1);
}

}

});

			function fitText(el,max,min){
			
			let size=max;
			
			el.style.fontSize=size+"px";
			
			
			while(
			el.scrollHeight > el.clientHeight
			&&
			size > min
			){
			
			size--;
			
			el.style.fontSize=size+"px";
			
			}
			
			}
			
			
			fitText(document.querySelector(".name"),72,20);

</script>
